syntax = "proto2";

import "folder/v1/files.proto";
import "folder/v1/common.proto";
import "google/protobuf/empty.proto";

package folder.v1;

message FolderUpdate {
  oneof update {
    NewFile new_file = 1;
    FolderNameChanged folder_name_changed = 2;
    google.protobuf.Empty folder_deleted = 3;
    FileDeleted file_deleted = 4;
  }
}

message FileDeleted {
  required FileId file_id = 1;
}

message FolderNameChanged {
  required string name = 1;
}

message NewFile {
  required FileView file = 1;
}