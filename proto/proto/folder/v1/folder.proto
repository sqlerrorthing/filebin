syntax = "proto2";

import "google/protobuf/empty.proto";
import "google/protobuf/duration.proto";
import "folder/v1/files.proto";
import "folder/v1/common.proto";
import "folder/v1/updates.proto";
import "folder/v1/encryption.proto";

package folder.v1;

service FolderService {
  rpc CreateFolder(CreateFolderRequest) returns (OwnedFolder);

  rpc DeleteFolder(DeleteFolderRequest) returns (google.protobuf.Empty);

  rpc Limits(google.protobuf.Empty) returns (LimitsResponse);

  rpc Rename(RenameRequest) returns (google.protobuf.Empty);

  rpc Updates(UpdatesRequest) returns (stream FolderUpdate);
}

message RenameRequest {
  required OwnedFolderRef owned_folder = 1;
  required EncryptedBlobs name = 2;
}

message UpdatesRequest {
  required FolderId id = 1;
}

message LimitsResponse {
  required uint32 max_files_per_folder = 1;
  required uint64 max_file_size = 2;
}

message CreateFolderRequest {
  required EncryptedVault name = 1;
  optional google.protobuf.Duration expires = 2;
}

message DeleteFolderRequest {
  required OwnedFolderRef owned_folder = 1;
}
