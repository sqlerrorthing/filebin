syntax = "proto2";

import "google/protobuf/empty.proto";
import "google/type/datetime.proto";
import "google/protobuf/duration.proto";

package folder.v1;

service FolderService {
  rpc CreateFolder(google.protobuf.Empty) returns (OwnedFolder);
}

message FolderId {
  required string value = 1;
}

// A token to edit files in the folder
message FolderToken {
  required string value = 2;
}

message FileView {
  required string mime = 1;
  required string name = 2;
  required sint64 size = 3;
}

message Folder {
  required FolderId id = 1;
  required google.type.DateTime created = 3;
  optional google.protobuf.Duration alive = 4;
  repeated FileView files = 2;
}

message OwnedFolder {
  required Folder folder = 1;
  required FolderToken token = 2;
}