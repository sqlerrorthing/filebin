syntax = "proto2";

import "google/protobuf/empty.proto";
import "google/type/datetime.proto";
import "google/protobuf/duration.proto";
import "folder/v1/files.proto";
import "folder/v1/common.proto";

package folder.v1;

service FolderService {
  rpc CreateFolder(CreateFolderRequest) returns (OwnedFolder);

  rpc UploadFile(stream UploadFileRequest) returns (UploadFileResponse);
}

message CreateFolderRequest {
  required string encrypted_name = 1;
  optional google.protobuf.Duration expires = 2;
}

message UploadFileRequest {
  oneof data {
    InitiateUpload initiate = 1;
    bytes chunk_data = 2;
  }
}

message InitiateUpload {
  required EncryptedFileMetadata metadata = 1;
  required FolderId id = 3;
  required FolderToken token = 2;
}

message UploadFileResponse {
  required FileId id = 1;
}

message Folder {
  required FolderId id = 1;
  required string encrypted_name = 2;
  required google.type.DateTime created_at = 3;
  optional google.type.DateTime expired_at = 4;
}

message OwnedFolder {
  required Folder folder = 1;
  // Token to modify folder's content
  required FolderToken token = 2;
}
