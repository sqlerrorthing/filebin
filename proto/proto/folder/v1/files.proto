syntax = "proto2";

package folder.v1;

import "folder/v1/common.proto";
import "folder/v1/encryption.proto";
import "google/protobuf/empty.proto";


service FilesService {
  rpc ListFiles(ListFilesRequest) returns (ListFilesResponse);
  rpc UploadFile(stream UploadFileRequest) returns (UploadFileResponse);
  rpc Download(DownloadRequest) returns (stream Blob);
  rpc Delete(DeleteRequest) returns (google.protobuf.Empty);
}

message DeleteRequest {
  required OwnedFolderRef folder = 1;
  required FileId file_id = 2;
}

message UploadFileRequest {
  oneof data {
    InitiateUpload initiate = 1;
    bytes chunk_data = 2;
  }
}

message InitiateUpload {
  // Encryption meta used to encrypt entire file
  required EncryptedVault vault = 3;
  required FileMetadata metadata = 1;
  required OwnedFolderRef folder = 2;
}

message UploadFileResponse {
  required FileId id = 1;
}

message DownloadRequest {
  required FolderId folder = 2;
  required FileId file = 1;
}

message Blob {
  required bytes part = 1;
}

message ListFilesRequest {
  required FolderId folder = 1;
}

message ListFilesResponse {
  repeated FileView files = 1;
}

message FileView {
  required FileId id = 3;
  required FileMetadata metadata = 1;
  required sint64 size = 2;
}

// Encrypted json payload
// Contains only path: string, mime: string and hash (of original file): string
message FileMetadata {
  required EncryptedBlobs value = 1;
}
