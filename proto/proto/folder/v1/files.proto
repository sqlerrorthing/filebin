syntax = "proto2";

package folder.v1;

service FilesService {
}

message FileId {
  required string value = 1;
}

message FileView {
  required FileId id = 3;
  required EncryptedFileMetadata metadata = 1;
  required sint64 size = 2;
}

message EncryptedFileMetadata {
  required string encrypted_path = 2;
  required string encrypted_mime = 1;
  required string encrypted_hash = 4;
}
