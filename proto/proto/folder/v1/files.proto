syntax = "proto2";

package folder.v1;

import "folder/v1/common.proto";


service FilesService {
  rpc ListFiles(ListFilesRequest) returns (ListFilesResponse);
}

message ListFilesRequest {
  required FolderId folder = 1;
}

message ListFilesResponse {
  repeated FileView files = 1;
}

message FileView {
  required FileId id = 3;
  required EncryptedFileMetadata metadata = 1;
  required sint64 size = 2;
}

message EncryptedFileMetadata {
  required string encrypted_path = 2;
  required string encrypted_mime = 1;
  required string encrypted_hash = 4;
}
