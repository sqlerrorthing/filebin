cargo-features = ["codegen-backend", "panic-immediate-abort"]

[workspace.package]
version = "0.1.0"
edition = "2024"

[profile.release]
strip = true
lto = true
codegen-units = 1
incremental = true
panic = "immediate-abort"

[workspace]
members = ["crates/*"]
resolver = "3"

[workspace.dependencies]
tracing = "0.1.44"
derive-new = "0.7.0"
async-trait = "0.1.89"
thiserror = "2.0.18"
tokio = { version = "1.52.3" }