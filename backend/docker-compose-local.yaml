services:
  filebin-backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        - CARGO_FLAGS=
    deploy:
      replicas: 2
    environment:
      RUST_LOG: debug

      SERVER__CONFIG: /etc/config
      SERVER__JWT__SECRET: b35d6f77ffd07203115eb045a754c6cd40a0af0bfd39d69e2aefc284956fa2b5e18f9e7469186c4335912414d02184210a72543ce9932a400692e40558fa1412

      SERVER__STORAGE__ACCESS_KEY: admin
      SERVER__STORAGE__SECRET_KEY: adminadmin
      SERVER__STORAGE__BUCKET: filebin
      SERVER__STORAGE__ENDPOINT_URL: http://minio:9000

      SERVER__REDIS__URL: redis://valkey:6379

      SERVER__DB__POSTGRES_URL: postgres://user:password@postgres:5432/filebin

      SERVER__RABBITMQ__URL: amqp://guest:guest@rabbitmq:5672//
    restart: always
    volumes:
      - ./config.yaml.sample:/etc/config
    networks:
      - filebin-network
    depends_on:
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      valkey:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend-grpc.rule=PathPrefix(`/`)"
      - "traefik.http.routers.backend-grpc.entrypoints=grpc"
      - "traefik.http.services.backend-grpc.loadbalancer.server.scheme=h2c"
      - "traefik.http.services.backend-grpc.loadbalancer.server.port=50051"

  traefik:
    image: traefik:v3.6.1
    container_name: traefik-filebin
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.grpc.address=:50051"
    ports:
      - "50051:50051"
      - "8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - filebin-network

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq-filebin-backend
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: "guest"
      RABBITMQ_DEFAULT_PASS: "guest"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    networks:
      - filebin-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  minio:
    image: minio/minio:latest
    container_name: minio-filebin-backend
    environment:
      MINIO_ROOT_USER: "admin"
      MINIO_ROOT_PASSWORD: "adminadmin"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - filebin-network

  minio-init:
    image: minio/mc:latest
    container_name: mc-filebin-backend
    depends_on:
      - minio
    networks:
      - filebin-network
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set myminio http://minio:9000 admin adminadmin) do echo 'Waiting for MinIO...' && sleep 1; done;
      /usr/bin/mc mb --ignore-existing myminio/filebin;
      /usr/bin/mc anonymous set download myminio/filebin;
      exit 0;
      "

  postgres:
    image: postgres:16-alpine
    container_name: postgres-filebin-backend
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: "user"
      POSTGRES_PASSWORD: "password"
      POSTGRES_DB: "filebin"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - filebin-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d filebin" ]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8.0-alpine
    container_name: valkey-filebin-backend
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    networks:
      - filebin-network

volumes:
  minio_data:
  postgres_data:
  valkey_data:
  rabbitmq_data:

networks:
  filebin-network:
    driver: bridge
